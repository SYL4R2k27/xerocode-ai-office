apiVersion: apps/v1
kind: Deployment
metadata:
  name: xerocode-backend
  namespace: xerocode
  labels:
    app: xerocode-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: xerocode-backend
  template:
    metadata:
      labels:
        app: xerocode-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/syl4r2k27/xerocode-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: xerocode-secrets
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(DB_USER):$(DB_PASSWORD)@postgres-service:5432/ai_office"
            - name: REDIS_URL
              value: "redis://redis-service:6379/0"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: xerocode
spec:
  selector:
    app: xerocode-backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: xerocode
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: xerocode-backend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
