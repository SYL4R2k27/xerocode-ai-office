<svg width="200" height="40" viewBox="0 0 200 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Symbol: abstract X made of connected nodes (orchestration) -->
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4F7CFF"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="8" y="4" fill="url(#grad)"/>
  <!-- X symbol from nodes -->
  <circle cx="11" cy="12" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="21" cy="12" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="16" cy="20" r="3" fill="white"/>
  <circle cx="11" cy="28" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="21" cy="28" r="2.5" fill="white" opacity="0.9"/>
  <!-- Connection lines -->
  <line x1="11" y1="12" x2="16" y2="20" stroke="white" stroke-width="1.2" opacity="0.5"/>
  <line x1="21" y1="12" x2="16" y2="20" stroke="white" stroke-width="1.2" opacity="0.5"/>
  <line x1="16" y1="20" x2="11" y2="28" stroke="white" stroke-width="1.2" opacity="0.5"/>
  <line x1="16" y1="20" x2="21" y2="28" stroke="white" stroke-width="1.2" opacity="0.5"/>
  <!-- Text: XeroCode -->
  <text x="40" y="26" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" letter-spacing="-0.5">XeroCode</text>
</svg>
